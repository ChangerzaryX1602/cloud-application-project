  platform-fastapi:
    build:
      context: ./platform-devops/fastapi
      dockerfile: Dockerfile
    image: platform-fastapi:latest
    container_name: platform-fastapi
    environment:
      - ERPNEXT_URL=${ERPNEXT_URL:-http://localhost:8080}
      - ERPNEXT_PUBLIC_URL=${ERPNEXT_PUBLIC_URL:-https://localhost:8080}
      - ERPNEXT_CLIENT_ID=${ERPNEXT_CLIENT_ID}
      - ERPNEXT_CLIENT_SECRET=${ERPNEXT_CLIENT_SECRET}
      - ERPNEXT_API_KEY=${ERPNEXT_API_KEY}
      - ERPNEXT_API_SECRET=${ERPNEXT_API_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=${REDIS_URL:-redis://redis-cache:6379}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-["https://localhost:3000"]}
      - DEBUG=${DEBUG:-false}
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.platform-api.rule=Host(`platform.mysterchat.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.platform-api.priority=100"
      - "traefik.http.routers.platform-api.entrypoints=prd"
      - "traefik.http.routers.platform-api.tls=true"
      - "traefik.http.routers.platform-api.tls.certresolver=myresolver"
      - "traefik.http.routers.platform-api.middlewares=platform-api-strip,platform-api-headers"
      - "traefik.http.middlewares.platform-api-strip.stripprefix.prefixes=/api"
      - "traefik.http.middlewares.platform-api-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.middlewares.platform-api-headers.headers.accessControlAllowOriginList=https://platform.mysterchat.com"
      - "traefik.http.middlewares.platform-api-headers.headers.accessControlAllowMethods=GET,POST,PUT,DELETE,OPTIONS"
      - "traefik.http.middlewares.platform-api-headers.headers.accessControlAllowHeaders=Authorization,Content-Type,X-Request-ID"
      - "traefik.http.services.platform-api.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    ports:
      - "8000:8000"

  platform-nextjs:
    build:
      context: ./platform-devops/nextjs
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_FASTAPI_URL: http://localhost:8000/api
        NEXT_PUBLIC_APP_URL: httrp://localhost:3000
    image: platform-nextjs:latest
    container_name: platform-nextjs
    environment:
      - FASTAPI_URL=http://localhost:8000
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NEXT_PUBLIC_FASTAPI_URL=https://localhost:8000/api
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.platform-console.rule=Host(`platform.mysterchat.com`) && !PathPrefix(`/api`)"
      - "traefik.http.routers.platform-console.priority=10"
      - "traefik.http.routers.platform-console.entrypoints=prd"
      - "traefik.http.routers.platform-console.tls=true"
      - "traefik.http.routers.platform-console.tls.certresolver=myresolver"
      - "traefik.http.services.platform-console.loadbalancer.server.port=3000"
    depends_on:
      - platform-fastapi
    restart: unless-stopped
    ports:
      - "3000:3000"