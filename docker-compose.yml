networks:
  traefik:
    external: true
    name: traefik

services: 
  traefik:
    image: traefik:latest
    container_name: traefik
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.file.directory=/etc/traefik/conf.d
      - --providers.file.watch=true
      - --entrypoints.prd.address=:443
      - --entrypoints.prd.http.tls=true
      - --certificatesresolvers.myresolver.acme.tlschallenge=true
      - --certificatesresolvers.myresolver.acme.email=chatchanan.pa@kkumail.com
      - --certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json
    ports:
      - "443:443"
      - "8081:8080"
      # - "3000:3000"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data/traefik/letsencrypt:/letsencrypt
      - ./ssl_san:/etc/traefik/tls:ro
      - "./conf.d:/etc/traefik/conf.d:ro"
    networks:
      - traefik
    restart: unless-stopped

  postgres:
    image: postgres:17
    container_name: cloud-project-postgres
    environment:
      POSTGRES_DB: cloud_project_postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "ChangeMe123!"
      TZ: Asia/Bangkok
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./configs/erpnext-init.sql:/docker-entrypoint-initdb.d/10-erpnext.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "15432:5432"
    networks:
      - traefik
    restart: unless-stopped

