  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: jenkins
    user: root  # ต้องเป็น root เพื่อให้รัน docker command ได้
    volumes:
      - ./data/jenkins:/var/jenkins_home
      - /home/changerzaryx/cloud-application-project:/home/changerzaryx/cloud-application-project
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jenkins.rule=Host(`ci.mysterchat.com`)"
      - "traefik.http.routers.jenkins.entrypoints=prd"
      - "traefik.http.routers.jenkins.tls=true"
      - "traefik.http.routers.jenkins.tls.certresolver=myresolver"
      - "traefik.http.services.jenkins.loadbalancer.server.port=8080"
    restart: unless-stopped

