networks:
  traefik:
    external: true
    name: traefik

x-erpnext-image: &erpnext_image
  image: frappe/erpnext:latest
  pull_policy: missing
  restart: unless-stopped

x-erpnext-volumes: &erpnext_volumes
  volumes:
    - ./data/erpnext/sites:/home/frappe/frappe-bench/sites
    - ./data/erpnext/logs:/home/frappe/frappe-bench/logs

x-erpnext-depends: &erpnext_depends
  depends_on:
    erpnext-configurator:
      condition: service_completed_successfully

services:
  # Redis for ERPNext queue, cache, and socketio
  erpnext-redis:
    image: redis:alpine
    container_name: erpnext-redis
    command: redis-server --appendonly yes
    volumes:
      - ./data/erpnext/redis:/data
    networks:
      - traefik
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-time configurator: writes apps.txt and common_site_config.json
  erpnext-configurator:
    <<: *erpnext_image
    volumes:
      - ./data/erpnext/sites:/home/frappe/frappe-bench/sites
    container_name: erpnext-configurator
    entrypoint:
      - bash
      - -c
    command:
      - |
        printf 'frappe\nerpnext\n' > /home/frappe/frappe-bench/apps.txt
        printf 'frappe\nerpnext\n' > /home/frappe/frappe-bench/sites/apps.txt
        printf '{"db_host":"%s","db_port":%s,"redis_cache":"redis://%s","redis_queue":"redis://%s","redis_socketio":"redis://%s","socketio_port":%s}\n' \
          "$$DB_HOST" "$$DB_PORT" "$$REDIS_CACHE" "$$REDIS_QUEUE" "$$REDIS_QUEUE" "$$SOCKETIO_PORT" \
          > /home/frappe/frappe-bench/sites/common_site_config.json
        echo "Configurator done."
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_CACHE: erpnext-redis:6379
      REDIS_QUEUE: erpnext-redis:6379
      SOCKETIO_PORT: 9000
    networks:
      - traefik
    depends_on:
      erpnext-redis:
        condition: service_healthy
    restart: on-failure

  # Gunicorn WSGI backend
  erpnext-backend:
    <<: [*erpnext_image, *erpnext_volumes, *erpnext_depends]
    container_name: erpnext-backend
    networks:
      - traefik

  # Nginx frontend — serves static assets and proxies to backend/websocket
  erpnext-frontend:
    <<: *erpnext_image
    container_name: erpnext-frontend
    command:
      - nginx-entrypoint.sh
    environment:
      BACKEND: erpnext-backend:8000
      SOCKETIO: erpnext-websocket:9000
      FRAPPE_SITE_NAME_HEADER: erpnext.mysterchat.com
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: "120"
      CLIENT_MAX_BODY_SIZE: 50m
    volumes:
      - ./data/erpnext/sites:/home/frappe/frappe-bench/sites
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.erpnext.rule=Host(`erpnext.mysterchat.com`)"
      - "traefik.http.routers.erpnext.entrypoints=prd"
      - "traefik.http.routers.erpnext.tls=true"
      - "traefik.http.routers.erpnext.tls.certresolver=myresolver"
      - "traefik.http.middlewares.erpnext-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.erpnext.middlewares=erpnext-headers"
      - "traefik.http.services.erpnext.loadbalancer.server.port=8080"
    depends_on:
      - erpnext-backend
      - erpnext-websocket

  # Node.js Socket.IO websocket server
  erpnext-websocket:
    <<: [*erpnext_image, *erpnext_depends]
    container_name: erpnext-websocket
    command:
      - node
      - /home/frappe/frappe-bench/apps/frappe/socketio.js
    volumes:
      - ./data/erpnext/sites:/home/frappe/frappe-bench/sites
    networks:
      - traefik

  # Short/default queue worker
  erpnext-queue-short:
    <<: [*erpnext_image, *erpnext_volumes, *erpnext_depends]
    container_name: erpnext-queue-short
    command: bench worker --queue short,default
    networks:
      - traefik

  # Long queue worker
  erpnext-queue-long:
    <<: [*erpnext_image, *erpnext_volumes, *erpnext_depends]
    container_name: erpnext-queue-long
    command: bench worker --queue long,default,short
    networks:
      - traefik

  # Scheduled tasks
  erpnext-scheduler:
    <<: [*erpnext_image, *erpnext_volumes, *erpnext_depends]
    container_name: erpnext-scheduler
    command: bench schedule
    networks:
      - traefik
